# SULV Unified Knowledge Base Configuration

database:
  path: "./data/kb.db"
  fts5_enabled: true
  connection_pool_size: 5

search:
  hybrid_weight_fts5: 0.4
  hybrid_weight_semantic: 0.6
  top_k: 10
  chunk_size: 512
  chunk_overlap: 50
  highlight_context_chars: 100

ai:
  # Primary AI provider for Q&A and reports
  primary: "claude_haiku"
  
  # Fallback provider if primary fails
  fallback: "kimi"
  
  # Local models for embeddings and basic tasks
  local_embedding: "all-MiniLM-L6-v2"
  local_summarizer: "flan-t5-small"
  
  # API configurations
  claude:
    api_key: "${CLAUDE_API_KEY}"
    model: "claude-3-haiku-20240307"
    max_tokens: 1000
    
  kimi:
    api_key: "${KIMI_API_KEY}"
    model: "kimi-k2.5"
    base_url: "https://api.moonshot.cn/v1"

sync:
  google:
    enabled: true
    interval_minutes: 15
    services:
      gmail: true
      chat: true
      drive: true
    watch_labels: ["SULV-Build", "SULV-Project"]
    
  local:
    enabled: true
    watch_paths: ["./data/inbox"]
    extensions: [".pdf", ".docx", ".xlsx", ".txt", ".md"]
    
  email_skill:
    enabled: true
    webhook_url: "http://localhost:8000/api/v1/integrations/email/webhook"

indexing:
  max_file_size_mb: 50
  supported_mime_types:
    - "application/pdf"
    - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
    - "text/plain"
    - "text/markdown"
    - "application/json"
  
  ocr:
    enabled: true
    language: "eng"
    engine: "tesseract"

api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  log_level: "info"
  
  # CORS settings
  cors:
    allow_origins: ["http://localhost:3000", "http://localhost:3001"]  # Dashboard ports
    allow_credentials: true
    allow_methods: ["*"]
    allow_headers: ["*"]
  
  # Rate limiting
  rate_limit:
    enabled: true
    requests_per_minute: 60
    burst_limit: 10

logging:
  level: "INFO"
  file: "./logs/kb_server.log"
  max_size_mb: 100
  backup_count: 5
  
  # Structured logging
  format: "json"
  include_timestamp: true
  include_pid: true

monitoring:
  # Health check endpoints
  health_check_interval: 30
  metrics_enabled: true
  metrics_port: 9090
  
  # Alerting
  alert_email: "admin_auto@sulv.com.au"
  alert_slack_webhook: "${SLACK_WEBHOOK_URL}"

# Integration-specific configurations
integrations:
  dashboard:
    # Dashboard-specific search defaults
    default_search_mode: "hybrid"
    default_limit: 20
    cache_ttl_seconds: 300
    
    # Real-time updates via WebSocket
    websocket_enabled: true
    websocket_path: "/ws/dashboard"
    
  email_skill:
    # Email processing defaults
    default_context_documents: 3
    auto_ingest_processed: true
    attachment_processing: true
    
    # Email categorization
    categories:
      - "project_inquiry"
      - "client_communication"
      - "supplier_invoice"
      - "internal_report"
    
  google_workspace:
    # Authentication
    credentials_path: "./config/google_credentials.json"
    token_path: "./config/google_token.json"
    
    # Scopes
    scopes:
      - "https://www.googleapis.com/auth/gmail.readonly"
      - "https://www.googleapis.com/auth/chat.messages.readonly"
      - "https://www.googleapis.com/auth/drive.readonly"
    
    # Sync filters
    gmail_query: "label:SULV-Build OR label:SULV-Project"
    drive_query: "'root' in parents and mimeType != 'application/vnd.google-apps.folder'"

# Project-specific configurations
projects:
  default_metadata:
    company: "SULV Construction"
    department: "Operations"
    country: "Australia"
    timezone: "Australia/Sydney"
  
  # Template for new projects
  template:
    required_fields: ["project_id", "client_name", "address"]
    default_tags: ["construction", "residential"]
    folder_structure:
      - "Contracts"
      - "Plans"
      - "Invoices"
      - "Communications"
      - "Photos"

# Development settings (override in production)
development:
  debug: true
  reload: true
  test_mode: false
  
  # Test data
  seed_test_data: true
  test_projects:
    - id: "SULV-2024-001"
      name: "St Ives Duplex"
      client: "Yvette"
    
    - id: "SULV-2024-002"
      name: "Chatswood Apartment"
      client: "Richard Carfi"